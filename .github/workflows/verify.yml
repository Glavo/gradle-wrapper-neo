name: Verify

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            gradle-command: ./gradlew
          - os: macos-latest
            gradle-command: ./gradlew
          - os: windows-latest
            gradle-command: .\gradlew.bat

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Make Gradle wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Verify project
        run: ${{ matrix.gradle-command }} clean build :wrapper-plugin:validatePlugins --no-daemon --warning-mode all
